<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nérée — Studio digital ultra premium</title>
    <meta name="description" content="Nérée conçoit des sites, e-commerces et applications sur-mesure pour les marques exigeantes. Direction artistique, ingénierie produit. Basé à Paris." />

    <!-- Open Graph / Facebook / LinkedIn / Slack / iMessage -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nérée — Studio digital ultra premium" />
    <meta property="og:description" content="Sites, e-commerces et applications sur-mesure pour les marques exigeantes. Studio indépendant basé à Paris." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="fr_FR" />
    <meta property="og:site_name" content="Nérée" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nérée — Studio digital ultra premium" />
    <meta name="twitter:description" content="Sites, e-commerces et applications sur-mesure pour les marques exigeantes. Studio indépendant basé à Paris." />
    <meta name="twitter:image" content="/og-image.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
    <script>
      // Apply theme before paint to avoid a flash. Light is the brand default.
      (function () {
        var stored = localStorage.getItem('neree-theme');
        var theme = stored === 'dark' ? 'dark' : 'light';
        if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
